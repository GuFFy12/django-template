pre-commit:
  fail_on_changes: always
  jobs:
    - name: formatters
      group:
        parallel: true
        jobs:
          - name: ruff
            glob: "*.py"
            run: >
              uv run ruff check --fix --exit-zero {staged_files} &&
              uv run ruff format {staged_files} &&
              uv run ruff check --fix --extend-ignore=PLR2004 {staged_files}

          - name: dprint
            exclude: \{\{_copier_conf\.answers_file\}\}\.jinja
            run: uv run dprint fmt --allow-no-files {staged_files}

          - name: djangofmt
            glob: "*.html"
            run: uv run djangofmt {staged_files}

    - name: analyzers
      group:
        parallel: true
        jobs:
          - name: mypy
            glob: "{pyproject.toml,src/**/*.py,tests/**/*.py}"
            run: uv run mypy .
