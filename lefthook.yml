pre-commit:
  fail_on_changes: always
  jobs:
    - name: formatters
      group:
        parallel: true
        jobs:
          - name: ruff
            glob: "*.py"
            run: |
              uv run ruff check --fix {staged_files}
              uv run ruff format {staged_files}

          - name: dprint
            exclude: \{\{_copier_conf\.answers_file\}\}\.jinja
            run: uv run dprint fmt --allow-no-files {staged_files}

          - name: djangofmt
            glob: "*.html"
            run: uv run djangofmt {staged_files}

    - name: analyzers
      group:
        parallel: true
        jobs:
          - name: validate-django
            run: uv run python manage.py check

          - name: validate-templates
            glob: "*.html"
            run: uv run python manage.py validate_templates

          - name: check-migrations
            glob: "*/models.py"
            run: uv run python manage.py makemigrations --check --dry-run
