services:
  init:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    command: >
      sh -c "rm -rf /etc/nginx/* && cp -a /app/nginx/. /etc/nginx/ &&
             rm -rf /var/www/staticfiles/* && cp -a /app/staticfiles/. /var/www/staticfiles/ &&
             python manage.py migrate --noinput"
    volumes:
      - nginx_config:/etc/nginx
      - staticfiles:/var/www/staticfiles
    depends_on:
      - postgres
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,172.16.0.0/12,${DJANGO_DOMAIN}
      POSTGRES_DB: django
      POSTGRES_USER: django
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CACHE_URL: redis://redis:6379/0

  app:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    depends_on:
      init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
    volumes:
      - media:/app/media
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,172.16.0.0/12,${DJANGO_DOMAIN}
      POSTGRES_DB: django
      POSTGRES_USER: django
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CACHE_URL: redis://valkey:6379/0
    restart: unless-stopped

  nginx:
    image: nginx:1.31.0-trixie
    depends_on:
      - app
    volumes:
      - nginx_config:/etc/nginx:ro
      - staticfiles:/var/www/staticfiles:ro
      - media:/var/www/media:ro
    networks:
      - default
      - traefik_network
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.${ROUTER_NAME}.rule=Host(`${DJANGO_DOMAIN}`)
      - traefik.http.routers.${ROUTER_NAME}.middlewares=default-chain@docker
      - traefik.http.routers.${ROUTER_NAME}.entrypoints=websecure
      - traefik.http.routers.${ROUTER_NAME}.service=${ROUTER_NAME}
      - traefik.http.services.${ROUTER_NAME}.loadbalancer.server.port=80

  postgres:
    image: postgres:18.4-trixie
    volumes:
      - database:/var/lib/postgresql
    environment:
      POSTGRES_DB: django
      POSTGRES_USER: django
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped

  valkey:
    image: valkey/valkey:9.1.0-trixie
    restart: unless-stopped

networks:
  traefik_network:
    external: true
  grafana-alloy_network:
    external: true

volumes:
  nginx_config:
  database:
  staticfiles:
  media:
