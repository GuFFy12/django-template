services:
  app:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    depends_on:
      - postgres
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,172.16.0.0/12,${DJANGO_DOMAIN}
      POSTGRES_DB: django
      POSTGRES_USER: django
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CACHE_URL: redis://valkey:6379/0
      GRANIAN_WORKERS: ${GRANIAN_WORKERS:-2}
      GRANIAN_RESPAWN_FAILED_WORKERS: true
    restart: unless-stopped

  postgres:
    image: postgres:18.4-trixie@sha256:7aba8c66107ee218ddbaacb30eae46d774bf5e34ab77a917be819b4e227493c4
    volumes:
      - database:/var/lib/postgresql
    environment:
      POSTGRES_DB: django
      POSTGRES_USER: django
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped

  valkey:
    image: valkey/valkey:9.1.0-trixie@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    restart: unless-stopped

volumes:
  database:
